name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    name: ${{ matrix.profile }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - debug
          - release

    env:
      ZEPHYR_SDK_VERSION: "0.17.0"

    steps:
      - uses: actions/checkout@v4
        with:
          path: openMatterSmartLock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            gperf \
            ccache \
            device-tree-compiler \
            xz-utils \
            file \
            make \
            wget \
            unzip \
            python3-pip

      - name: Install GN (used by Matter / ConnectedHomeIP)
        run: |
          GN_URL="https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
          mkdir -p /tmp/gn && cd /tmp/gn
          wget -q -O gn.zip "${GN_URL}"
          unzip -q gn.zip
          sudo install -m 755 gn /usr/local/bin/gn
          gn --version

      - name: Install west
        run: pip install west

      - name: Cache NCS workspace
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/openMatterSmartLock/zephyr
            ${{ github.workspace }}/openMatterSmartLock/modules
            ${{ github.workspace }}/openMatterSmartLock/nrf
            ${{ github.workspace }}/openMatterSmartLock/nrfxlib
            ${{ github.workspace }}/openMatterSmartLock/bootloader
            ${{ github.workspace }}/openMatterSmartLock/tools
          key: ncs-v3.1.1-${{ runner.os }}-v2

      - name: Initialize west workspace
        working-directory: openMatterSmartLock
        run: |
          west init -l firmware
          # Full (non-shallow, non-narrow) clones: several NCS projects
          # pin to arbitrary SHAs that are not reachable in a depth=1
          # fetch, causing the update to fail silently for multiple
          # projects. The total workspace is ~5 GB; fits in the runner.
          west update

      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-${{ runner.os }}

      - name: Download Zephyr SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK=zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          wget -q "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/${SDK}"
          tar xf "${SDK}"
          cd "zephyr-sdk-${ZEPHYR_SDK_VERSION}"
          ./setup.sh -t arm-zephyr-eabi -h -c

      - name: Register Zephyr SDK
        run: |
          cd "zephyr-sdk-${ZEPHYR_SDK_VERSION}"
          ./setup.sh -t arm-zephyr-eabi -h -c

      - name: Install Zephyr Python requirements
        working-directory: openMatterSmartLock
        run: |
          pip install -r zephyr/scripts/requirements.txt
          pip install -r nrf/scripts/requirements.txt || true

      - name: Install Matter codegen Python package
        working-directory: openMatterSmartLock
        run: |
          # chip_codegen.cmake imports `from matter.idl.generators...`
          # which is provided by Matter's py_matter_idl package.
          pip install modules/lib/matter/scripts/py_matter_idl

      - name: Resolve profile flags
        id: prof
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            echo "extra=-DCONF_FILE=prj_release.conf -DEXTRA_CONF_FILE=boards/nanoBoard.conf -DDTC_OVERLAY_FILE=boards/nanoBoard.overlay" >> "$GITHUB_OUTPUT"
          else
            echo "extra=-DEXTRA_CONF_FILE=boards/nanoBoard.conf -DDTC_OVERLAY_FILE=boards/nanoBoard.overlay" >> "$GITHUB_OUTPUT"
          fi

      - name: Build firmware (${{ matrix.profile }}, nanoBoard / nRF52840)
        working-directory: openMatterSmartLock
        run: |
          export ZEPHYR_TOOLCHAIN_VARIANT=zephyr
          export ZEPHYR_SDK_INSTALL_DIR="${{ github.workspace }}/zephyr-sdk-${ZEPHYR_SDK_VERSION}"
          # Force --no-sysbuild: NCS 3.x auto-enables sysbuild when it
          # detects firmware/Kconfig.sysbuild. The sysbuild path then
          # pulls ncs_sysbuild_extensions which is missing under the
          # --narrow west update used for fast CI. Debug + release are
          # flat images (no MCUboot, no OTA) so sysbuild adds nothing
          # here; the release+OTA profile is its own separate build.
          west build \
            --board nrf52840dk/nrf52840 \
            --no-sysbuild \
            --pristine always \
            firmware \
            -- ${{ steps.prof.outputs.extra }}

      - name: Report size
        if: always()
        working-directory: openMatterSmartLock
        run: |
          if [ -f build/zephyr/zephyr.elf ]; then
            "${{ github.workspace }}/zephyr-sdk-${ZEPHYR_SDK_VERSION}/arm-zephyr-eabi/bin/arm-zephyr-eabi-size" build/zephyr/zephyr.elf || true
          fi

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: omsl-nanoBoard-${{ matrix.profile }}
          path: |
            openMatterSmartLock/build/zephyr/zephyr.hex
            openMatterSmartLock/build/zephyr/zephyr.elf
            openMatterSmartLock/build/zephyr/zephyr.map
            openMatterSmartLock/build/merged.hex
          if-no-files-found: warn
          retention-days: 14

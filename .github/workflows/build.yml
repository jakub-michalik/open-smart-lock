name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - nanoBoard
          - nanoBoard
          - nanoBoard
          - nanoBoard/nrf54lm20a/cpuapp
          - nanoBoard/nrf5340/cpuapp
    container:
      image: nordicplayground/nrfconnect-sdk:main
    steps:
      - uses: actions/checkout@v4
        with:
          path: openMatterSmartLock

      - name: Initialize west workspace
        working-directory: openMatterSmartLock
        run: |
          west init -l firmware
          west update --narrow

      - name: Build firmware
        working-directory: openMatterSmartLock
        run: |
          west build -b "${{ matrix.board }}" -p auto firmware --sysbuild

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omsl-${{ matrix.board }}
          path: openMatterSmartLock/build/**/zephyr.hex
          if-no-files-found: ignore

  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: nordicplayground/nrfconnect-sdk:main
    steps:
      - uses: actions/checkout@v4
        with:
          path: openMatterSmartLock

      - name: Initialize west workspace
        working-directory: openMatterSmartLock
        run: |
          west init -l firmware
          west update --narrow

      - name: Run ztest unit tests on native_sim
        working-directory: openMatterSmartLock
        run: ./scripts/run_tests.sh

#
# openMatterSmartLock — base application configuration. This file overrides
# Kconfig defaults pulled in by the NCS Matter sample base, which
# CONFIG_NCS_SAMPLE_MATTER_* options compose for us.

# Enable Matter / CHIP stack
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="app/chip_project_config.h"

# No OTA / no MCUboot — application runs as a flat image on internal flash.
# This matches a custom-hardware variant without an external NOR.
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_BOOTLOADER_NONE=y

# Device identity
CONFIG_CHIP_DEVICE_VENDOR_ID=65521
CONFIG_CHIP_DEVICE_PRODUCT_ID=33024
CONFIG_CHIP_DEVICE_VENDOR_NAME="openMatterSmartLock"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="OMSL Door Lock"

# Primary device type: Door Lock (0x000A)
CONFIG_CHIP_DEVICE_TYPE=10
CONFIG_CHIP_COMMISSIONABLE_DEVICE_TYPE=y

# Standard / common Matter sample options
CONFIG_DK_LIBRARY=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_STD_CPP17=y

# Thread + BLE for commissioning
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OMSL"

# Power management
CONFIG_PM_DEVICE=y
CONFIG_THREAD_NAME=y

# Disable NFC onboarding (not used by openMatterSmartLock reference boards)
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# Matter shell + test shell off in default build to keep image size
# inside the internal-flash MCUboot primary slot on nRF52840.
# Re-enable in a debug overlay (snippets/dev-shell) when needed.
CONFIG_CHIP_LIB_SHELL=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_SHELL=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_REBOOT=y

# Settings subsystem for snapshot persistence
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Reliability
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n

# ZAP file path used by the Matter data-model generator at build time.
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/app/zap/door_lock.zap"

# ADC for battery monitoring
CONFIG_ADC=y

# Settings subsystem for snapshot persistence
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- Memory budget tuning ------------------------------------------------
# Stack sizes per Zephyr / Matter / BT thread. Values chosen against
# the worst-case Door Lock cluster commissioning path, verified with
# CONFIG_THREAD_ANALYZER on the nanoBoard reference.
CONFIG_CHIP_TASK_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Heap budget — Matter uses chip::Platform::MemoryAlloc which is sized
# from CONFIG_HEAP_MEM_POOL_SIZE.
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Note: BT and NET buffer sizing relies on NCS Matter sample defaults
# (Kconfig.defaults under the chip-module). Setting them explicitly
# here triggered warnings when MCUboot/OTA was disabled — leaving the
# upstream defaults in place keeps the build robust across profiles.

# Stack / heap instrumentation. Disabled in release; enabled in debug
# for memory regression testing via shell command 'kernel stacks'.
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_LOG=y
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_NAME=y

# Disable C++ exceptions and RTTI to keep code size and heap pressure low.
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n

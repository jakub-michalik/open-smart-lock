#
# openMatterSmartLock — base application configuration. This file overrides
# Kconfig defaults pulled in by the NCS Matter sample base, which
# CONFIG_NCS_SAMPLE_MATTER_* options compose for us.

# Enable Matter / CHIP stack
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="app/chip_project_config.h"

# Device identity
CONFIG_CHIP_DEVICE_VENDOR_ID=0xFFF1
CONFIG_CHIP_DEVICE_PRODUCT_ID=0x8100
CONFIG_CHIP_DEVICE_VENDOR_NAME="openMatterSmartLock"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="OMSL Door Lock"

# Primary device type: Door Lock (0x000A)
CONFIG_CHIP_DEVICE_TYPE=10
CONFIG_CHIP_COMMISSIONABLE_DEVICE_TYPE=y

# Standard / common Matter sample options
CONFIG_DK_LIBRARY=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_STD_CPP17=y

# Thread + BLE for commissioning
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OMSL"

# Power management
CONFIG_PM_DEVICE=y
CONFIG_THREAD_NAME=y

# Disable NFC onboarding (not used by openMatterSmartLock reference boards)
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# Matter shell + test shell for development builds
CONFIG_CHIP_LIB_SHELL=y
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_REBOOT=y

# Settings subsystem for snapshot persistence
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Reliability
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n

# ZAP file path used by the Matter data-model generator at build time.
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/app/zap/door_lock.zap"

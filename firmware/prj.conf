# Zephyr core
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_REBOOT=y

# C++
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_NEWLIB_LIBC=y

# Stack / memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# UART backend explicit
CONFIG_UART_CONSOLE=y

# Matter / CHIP
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="app/chip_project_config.h"
CONFIG_CHIP_DEVICE_VENDOR_ID=0xFFF1
CONFIG_CHIP_DEVICE_PRODUCT_ID=0x8100
CONFIG_CHIP_DEVICE_TYPE=10
CONFIG_CHIP_OTA_REQUESTOR=n

# Thread
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_FTD=n
CONFIG_OPENTHREAD_SLAAC=y

# BLE for commissioning
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OMSL"

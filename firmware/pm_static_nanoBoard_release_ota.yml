# Partition layout for nanoBoard with OTA — internal flash only.
# Both MCUboot slots in on-SoC 1 MiB flash with 484 KB each (room for
# the release+OTA image plus the MCUboot trailer + header).
#
#   0x00000..0x07000  mcuboot bootloader   ( 28 KiB)
#   0x07000..0x07200  mcuboot_pad          (  0.5 KiB header)
#   0x07200..0x80000  app                  (~483 KiB)
#   0x07000..0x80000  mcuboot_primary slot ( 484 KiB span = pad + app)
#   0x80000..0xF9000  mcuboot_secondary    ( 484 KiB OTA staging in flash)
#   0xF9000..0xFF000  settings_storage     ( 24 KiB)
#   0xFF000..0x100000 factory_data         (  4 KiB)

mcuboot:
  address: 0x0
  size: 0x7000
  region: flash_primary

mcuboot_pad:
  address: 0x7000
  size: 0x200

app:
  address: 0x7200
  size: 0x78e00

mcuboot_primary:
  orig_span: &id001
    - mcuboot_pad
    - app
  span: *id001
  address: 0x7000
  size: 0x79000
  region: flash_primary

mcuboot_primary_app:
  orig_span: &id002
    - app
  span: *id002
  address: 0x7200
  size: 0x78e00

mcuboot_secondary:
  address: 0x80000
  size: 0x79000
  region: flash_primary

settings_storage:
  address: 0xf9000
  size: 0x6000
  region: flash_primary

factory_data:
  address: 0xff000
  size: 0x1000
  region: flash_primary

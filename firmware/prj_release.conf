#
# Release profile — full stripping, no console, LTO, no shells, no
# MCUboot (matches the no-NOR / no-OTA build path on internal flash
# only). For interactive bring-up use prj.conf (debug) which keeps
# logging and UART console.

# Matter / CHIP stack
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="app/chip_project_config.h"
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_BOOTLOADER_NONE=y

# Device identity
CONFIG_CHIP_DEVICE_VENDOR_ID=65521
CONFIG_CHIP_DEVICE_PRODUCT_ID=33024
CONFIG_CHIP_DEVICE_VENDOR_NAME="openMatterSmartLock"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="OMSL Door Lock"
CONFIG_CHIP_DEVICE_TYPE=10
CONFIG_CHIP_COMMISSIONABLE_DEVICE_TYPE=y

# Standard Matter sample options
CONFIG_DK_LIBRARY=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_STD_CPP17=y

# Thread + BLE for commissioning
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="OMSL"

# Extended BLE commissioning advertising
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Power management — release-grade
CONFIG_PM_DEVICE=y
CONFIG_RAM_POWER_DOWN_LIBRARY=y

# Reliability
CONFIG_RESET_ON_FATAL_ERROR=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_NCS_SAMPLE_MATTER_WATCHDOG=y

# NFC onboarding off
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# All debug features OFF in release
CONFIG_USE_SEGGER_RTT=n
CONFIG_SHELL=n
CONFIG_CHIP_LIB_SHELL=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_OPENTHREAD_SHELL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_LOG=n
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_PRINTK=n
CONFIG_PRINTK_SYNC=n
CONFIG_THREAD_NAME=n
CONFIG_BOOT_BANNER=n
CONFIG_ASSERT_VERBOSE=n
CONFIG_ASSERT_NO_FILE_INFO=y

# Settings subsystem
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ZAP file path
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/app/zap/door_lock.zap"

# Stack / heap
CONFIG_CHIP_TASK_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Code size optimizations
CONFIG_LTO=y
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_DEBUG=n
CONFIG_ASSERT=n
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y

# Strip dev-mode instrumentation
CONFIG_INIT_STACKS=n
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_STACK_INFO=n

# No C++ exceptions / RTTI
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n

# Matter Intermittently Connected Device (ICD/SED) tuning —
# slow poll every 5 s for low-power MED operation.
CONFIG_CHIP_ICD_SLOW_POLL_INTERVAL=5000
CONFIG_CHIP_ICD_FAST_POLLING_INTERVAL=500
CONFIG_CHIP_ICD_SIT_SLOW_POLL_LIMIT=15000
CONFIG_OPENTHREAD_POLL_PERIOD=5000

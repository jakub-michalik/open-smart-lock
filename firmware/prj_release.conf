# Release build: minimal logging, optimized
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_NO_OPTIMIZATIONS=n
CONFIG_DEBUG=n
CONFIG_ASSERT=n

# Release build strips thread analyzer / stack instrumentation
CONFIG_INIT_STACKS=n
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_STACK_INFO=n
